syntax = "proto3";

package sikuli.v1;

option go_package = "github.com/smysnk/sikuligo/internal/grpcv1/pb;sikuliv1";

message GrayImage {
  string name = 1;
  int32 width = 2;
  int32 height = 3;
  bytes pix = 4;
}

message Point {
  int32 x = 1;
  int32 y = 2;
}

message Rect {
  int32 x = 1;
  int32 y = 2;
  int32 w = 3;
  int32 h = 4;
}

message Pattern {
  GrayImage image = 1;
  optional double similarity = 2;
  optional bool exact = 3;
  Point target_offset = 4;
  optional double resize_factor = 5;
  GrayImage mask = 6;
}

message Match {
  Rect rect = 1;
  double score = 2;
  Point target = 3;
  int32 index = 4;
}

message TextMatch {
  Rect rect = 1;
  string text = 2;
  double confidence = 3;
  int32 index = 4;
}

message OCRParams {
  string language = 1;
  string training_data_path = 2;
  optional double min_confidence = 3;
  optional int64 timeout_millis = 4;
  optional bool case_sensitive = 5;
}

message InputOptions {
  optional int64 delay_millis = 1;
  string button = 2;
}

message ObserveOptions {
  optional int64 interval_millis = 1;
  optional int64 timeout_millis = 2;
}

message AppOptions {
  optional int64 timeout_millis = 1;
}

message WindowQuery {
  string id = 1;
  string title_exact = 2;
  string title_contains = 3;
  bool focused_only = 4;
  optional int32 index = 5;
}

message Window {
  string id = 1;
  string app = 2;
  int32 pid = 3;
  string title = 4;
  Rect bounds = 5;
  bool focused = 6;
}

message ScreenDescriptor {
  int32 id = 1;
  string name = 2;
  Rect bounds = 3;
  bool primary = 4;
}

message ObserveEvent {
  string type = 1;
  Match match = 2;
  int64 timestamp_unix_millis = 3;
}

message FindRequest {
  GrayImage source = 1;
  Pattern pattern = 2;
  MatcherEngine matcher_engine = 3;
}

message FindResponse {
  Match match = 1;
}

message FindAllResponse {
  repeated Match matches = 1;
}

enum MatcherEngine {
  MATCHER_ENGINE_UNSPECIFIED = 0;
  MATCHER_ENGINE_TEMPLATE = 1;
  MATCHER_ENGINE_ORB = 2;
  MATCHER_ENGINE_HYBRID = 3;
  MATCHER_ENGINE_AKAZE = 4;
  MATCHER_ENGINE_BRISK = 5;
  MATCHER_ENGINE_KAZE = 6;
  MATCHER_ENGINE_SIFT = 7;
}

message ScreenQueryOptions {
  Rect region = 1;
  optional int64 timeout_millis = 2;
  optional int64 interval_millis = 3;
  MatcherEngine matcher_engine = 4;
  optional int32 screen_id = 5;
}

message ListScreensRequest {}

message ListScreensResponse {
  repeated ScreenDescriptor screens = 1;
}

message GetPrimaryScreenRequest {}

message GetPrimaryScreenResponse {
  ScreenDescriptor screen = 1;
}

message CaptureScreenRequest {
  optional int32 screen_id = 1;
  Rect region = 2;
}

message CaptureScreenResponse {
  GrayImage image = 1;
  ScreenDescriptor screen = 2;
}

message FindOnScreenRequest {
  Pattern pattern = 1;
  ScreenQueryOptions opts = 2;
}

message ExistsOnScreenRequest {
  Pattern pattern = 1;
  ScreenQueryOptions opts = 2;
}

message ExistsOnScreenResponse {
  bool exists = 1;
  Match match = 2;
}

message WaitOnScreenRequest {
  Pattern pattern = 1;
  ScreenQueryOptions opts = 2;
}

message ClickOnScreenRequest {
  Pattern pattern = 1;
  ScreenQueryOptions opts = 2;
  InputOptions click_opts = 3;
}

message ReadTextRequest {
  GrayImage source = 1;
  OCRParams params = 2;
}

message ReadTextResponse {
  string text = 1;
}

message FindTextRequest {
  GrayImage source = 1;
  string query = 2;
  OCRParams params = 3;
}

message FindTextResponse {
  repeated TextMatch matches = 1;
}

message MoveMouseRequest {
  int32 x = 1;
  int32 y = 2;
  InputOptions opts = 3;
}

message ClickRequest {
  int32 x = 1;
  int32 y = 2;
  InputOptions opts = 3;
}

message TypeTextRequest {
  string text = 1;
  InputOptions opts = 2;
}

message HotkeyRequest {
  repeated string keys = 1;
}

message ScrollWheelRequest {
  int32 x = 1;
  int32 y = 2;
  string direction = 3;
  int32 steps = 4;
  InputOptions opts = 5;
}

message ActionResponse {}

message ObserveRequest {
  GrayImage source = 1;
  Rect region = 2;
  Pattern pattern = 3;
  ObserveOptions opts = 4;
}

message ObserveChangeRequest {
  GrayImage source = 1;
  Rect region = 2;
  ObserveOptions opts = 3;
}

message ObserveResponse {
  repeated ObserveEvent events = 1;
}

message AppActionRequest {
  string name = 1;
  repeated string args = 2;
  AppOptions opts = 3;
}

message WindowQueryRequest {
  string name = 1;
  AppOptions opts = 2;
  WindowQuery query = 3;
}

message IsAppRunningResponse {
  bool running = 1;
}

message GetWindowResponse {
  bool found = 1;
  Window window = 2;
}

message ListWindowsResponse {
  repeated Window windows = 1;
}

service SikuliService {
  rpc ListScreens(ListScreensRequest) returns (ListScreensResponse);
  rpc GetPrimaryScreen(GetPrimaryScreenRequest) returns (GetPrimaryScreenResponse);
  rpc CaptureScreen(CaptureScreenRequest) returns (CaptureScreenResponse);

  rpc Find(FindRequest) returns (FindResponse);
  rpc FindAll(FindRequest) returns (FindAllResponse);
  rpc FindOnScreen(FindOnScreenRequest) returns (FindResponse);
  rpc ExistsOnScreen(ExistsOnScreenRequest) returns (ExistsOnScreenResponse);
  rpc WaitOnScreen(WaitOnScreenRequest) returns (FindResponse);
  rpc ClickOnScreen(ClickOnScreenRequest) returns (FindResponse);

  rpc ReadText(ReadTextRequest) returns (ReadTextResponse);
  rpc FindText(FindTextRequest) returns (FindTextResponse);

  rpc MoveMouse(MoveMouseRequest) returns (ActionResponse);
  rpc Click(ClickRequest) returns (ActionResponse);
  rpc TypeText(TypeTextRequest) returns (ActionResponse);
  rpc PasteText(TypeTextRequest) returns (ActionResponse);
  rpc Hotkey(HotkeyRequest) returns (ActionResponse);
  rpc MouseDown(ClickRequest) returns (ActionResponse);
  rpc MouseUp(ClickRequest) returns (ActionResponse);
  rpc KeyDown(HotkeyRequest) returns (ActionResponse);
  rpc KeyUp(HotkeyRequest) returns (ActionResponse);
  rpc ScrollWheel(ScrollWheelRequest) returns (ActionResponse);

  rpc ObserveAppear(ObserveRequest) returns (ObserveResponse);
  rpc ObserveVanish(ObserveRequest) returns (ObserveResponse);
  rpc ObserveChange(ObserveChangeRequest) returns (ObserveResponse);

  rpc OpenApp(AppActionRequest) returns (ActionResponse);
  rpc FocusApp(AppActionRequest) returns (ActionResponse);
  rpc CloseApp(AppActionRequest) returns (ActionResponse);
  rpc IsAppRunning(AppActionRequest) returns (IsAppRunningResponse);
  rpc ListWindows(AppActionRequest) returns (ListWindowsResponse);
  rpc FindWindows(WindowQueryRequest) returns (ListWindowsResponse);
  rpc GetWindow(WindowQueryRequest) returns (GetWindowResponse);
  rpc GetFocusedWindow(AppActionRequest) returns (GetWindowResponse);
}
