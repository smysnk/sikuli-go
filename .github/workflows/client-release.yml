name: Client Release

on:
  push:
    branches:
      - "release"
  workflow_dispatch:
    inputs:
      publish_python:
        description: "Publish Python package to PyPI"
        required: false
        default: false
        type: boolean
      publish_node_binaries:
        description: "Publish Node binary packages to npm"
        required: false
        default: false
        type: boolean
      publish_node:
        description: "Publish Node package to npm"
        required: false
        default: false
        type: boolean
      publish_homebrew:
        description: "Publish Homebrew formula/artifacts"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  tagged-server-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Install OCR/OpenCV native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libopencv-dev \
            libopencv-contrib-dev \
            tesseract-ocr \
            libtesseract-dev \
            libleptonica-dev \
            tesseract-ocr-eng

      - name: Verify tagged server binaries compile
        run: |
          make build-go

  client-release-smoke:
    needs: tagged-server-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Install OCR/OpenCV native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libopencv-dev \
            libopencv-contrib-dev \
            tesseract-ocr \
            libtesseract-dev \
            libleptonica-dev \
            tesseract-ocr-eng

      - name: Verify release flows (no publish)
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
          NODE_BIN_TARGETS: bin-linux-x64
        run: ./scripts/clients/release-verify.sh

  python-client:
    needs: client-release-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Python client
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PYPI_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_python) && '1' || '0' }}
        run: ./scripts/clients/release-python-client.sh

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-client-dist
          path: packages/client-python/dist/*

  node-binaries:
    needs: client-release-smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            node_bin_target: bin-linux-x64
          - runner: macos-14
            node_bin_target: bin-darwin-arm64
          - runner: macos-13
            node_bin_target: bin-darwin-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install OCR/OpenCV native dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libopencv-dev \
            libopencv-contrib-dev \
            tesseract-ocr \
            libtesseract-dev \
            libleptonica-dev \
            tesseract-ocr-eng

      - name: Install OCR/OpenCV native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config opencv tesseract leptonica
          BREW_PREFIX="$(brew --prefix)"
          echo "CGO_CFLAGS=-I${BREW_PREFIX}/opt/leptonica/include -I${BREW_PREFIX}/opt/tesseract/include" >> "$GITHUB_ENV"
          echo "CGO_CXXFLAGS=-I${BREW_PREFIX}/opt/leptonica/include -I${BREW_PREFIX}/opt/tesseract/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${BREW_PREFIX}/opt/leptonica/lib -L${BREW_PREFIX}/opt/tesseract/lib" >> "$GITHUB_ENV"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Node binary packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_node || inputs.publish_node_binaries) && '1' || '0' }}
          NODE_BIN_TARGETS: ${{ matrix.node_bin_target }}
        run: ./scripts/clients/release-node-binaries.sh

      - name: Upload Node binary checksums
        uses: actions/upload-artifact@v6
        with:
          name: node-binary-checksums-${{ matrix.node_bin_target }}
          path: packages/client-node/packages/checksums.txt

  node-client:
    needs:
      - client-release-smoke
      - node-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/client-node/package-lock.json

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Node client
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_node || inputs.publish_node_binaries) && '1' || '0' }}
        run: ./scripts/clients/release-node-client.sh

  homebrew:
    needs: client-release-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_homebrew) && '1' || '0' }}
        run: bash ./scripts/clients/release-homebrew.sh
