name: Client Release

on:
  push:
    branches:
      - "release"
  workflow_dispatch:
    inputs:
      publish_python:
        description: "Publish Python package to PyPI"
        required: false
        default: false
        type: boolean
      publish_node_binaries:
        description: "Publish Node binary packages to npm"
        required: false
        default: false
        type: boolean
      publish_node:
        description: "Publish Node package to npm"
        required: false
        default: false
        type: boolean

jobs:
  tagged-server-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install OCR/OpenCV native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libopencv-dev \
            libopencv-contrib-dev \
            tesseract-ocr \
            libtesseract-dev \
            libleptonica-dev \
            tesseract-ocr-eng

      - name: Verify tagged server binaries compile
        run: |
          go build -tags "gosseract opencv" -o /tmp/sikuligo-tagged ./cmd/sikuligrpc
          go build -tags "gosseract opencv" -o /tmp/sikuligo-monitor-tagged ./cmd/sikuligo-monitor

  python-client:
    needs: tagged-server-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Python client
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PYPI_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_python) && '1' || '0' }}
        run: ./scripts/clients/release-python-client.sh

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-client-dist
          path: clients/python/dist/*

  node-binaries:
    needs: tagged-server-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Node binary packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_node || inputs.publish_node_binaries) && '1' || '0' }}
        run: ./scripts/clients/release-node-binaries.sh

      - name: Upload Node binary checksums
        uses: actions/upload-artifact@v6
        with:
          name: node-binary-checksums
          path: clients/node/packages/checksums.txt

  node-client:
    needs: node-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: clients/node/package-lock.json

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"

      - name: Set client version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.CLIENT_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.CLIENT_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.CLIENT_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.CLIENT_VERSION_PATCH_FIXED }}
        run: ./scripts/clients/set-version-from-build.sh

      - name: Build and optionally publish Node client
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'release') || inputs.publish_node || inputs.publish_node_binaries) && '1' || '0' }}
        run: ./scripts/clients/release-node-client.sh
