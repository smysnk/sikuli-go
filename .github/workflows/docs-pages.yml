name: Publish Docs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up GoLang
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/api/go.mod
          cache: true

      - name: Install OpenCV native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libopencv-dev libopencv-contrib-dev

      - name: Run benchmark suite
        env:
          FIND_BENCH_PATCH_READMES: "0"
          FIND_BENCH_PUBLISH_DOCS: "1"
          FIND_BENCH_DOCS_REPORT_DIR: "docs/bench/reports"
          FIND_BENCH_DETERMINISTIC_REPORT: "1"
          FIND_BENCH_SEED: "20260304"
          FIND_BENCH_TEST_TIMEOUT: "120m"
        run: make benchmark

      - name: Generate API docs
        run: ./scripts/generate-api-docs.sh

      - name: Generate parity docs
        run: ./scripts/generate-parity-docs.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs
          destination: _site

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docs-benchmark-results
          path: .test-results/bench
          retention-days: 14

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
